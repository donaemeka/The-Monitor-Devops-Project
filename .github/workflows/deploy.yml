name:  Deploy The Monitor Project

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Step 1: Checkout repo
      - name:  Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup Terraform
      - name:  Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      # Step 3: Setup Ansible
      - name:  Setup Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip sshpass
          pip3 install ansible==8.6.0
          # Install required collections with full path
          ansible-galaxy collection install community.docker
          # Also install docker-compose collection
          ansible-galaxy collection install community.general
          

      # Step 4: Create terraform.tfvars
      - name:  Create Terraform Variables File
        run: |
          mkdir -p terraform
          cat > terraform/terraform.tfvars << 'EOF'
          key_name  = "odogwu1"
          EOF
          echo "terraform.tfvars created!"

      # Step 4.5: Create S3 Bucket for eu-west-2
      - name:  Create New S3 Bucket
        run: |
          echo "=== Creating New S3 Bucket ==="
          
          # Create unique bucket name
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          NEW_BUCKET="terraform-state-${ACCOUNT_ID}-eu-west-2"
          echo "Using bucket: $NEW_BUCKET"
          
          # For eu-west-2, use simple mb command
          aws s3 mb s3://$NEW_BUCKET --region eu-west-2 || echo "Bucket may already exist"
          
          # Enable versioning
          aws s3api put-bucket-versioning \
            --bucket $NEW_BUCKET \
            --versioning-configuration Status=Enabled \
            --region eu-west-2
          
          # Update Terraform configuration to use new bucket
          sed -i 's/my-new-terraform-bucket/'"$NEW_BUCKET"'/g' terraform/main.tf
          sed -i 's/region.*=.*"eu-west-2"/region = "eu-west-2"/g' terraform/main.tf
          echo "Updated Terraform to use new bucket: $NEW_BUCKET"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-2

      # Step 5: Verify AWS Key Pair Exists
      - name:  Verify Key Pair
        run: |
          echo "=== Checking Key Pair in eu-west-2 ==="
          aws ec2 describe-key-pairs --region eu-west-2 --key-names "odogwu1"
          echo "Key pair 'odogwu1' exists in eu-west-2!"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-2

      # Step 6: Terraform Init
      - name:  Terraform Init
        run: terraform -chdir=terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-2

      # Step 7: Terraform Plan
      - name:  Terraform Plan
        run: terraform -chdir=terraform plan -var-file="terraform.tfvars" -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-2

      # Step 8: Terraform Apply
      - name:  Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-2

      # Step 9: Get EC2 IP
      - name:  Get Server IP
        id: get-ip
        run: |
          # Get raw output and extract only the IP address
          RAW_OUTPUT=$(terraform -chdir=terraform output -raw public_ip)
          IP=$(echo "$RAW_OUTPUT" | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n1)
          
          # Verify it's a valid IP address
          if [[ $IP =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IP_ADDRESS=$IP" >> $GITHUB_ENV
            echo " Server IP: $IP"
          else
            echo "❌ ERROR: Invalid IP address format: '$IP'"
            echo "Raw output was: '$RAW_OUTPUT'"
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-2

      # Step 10: Wait for SSH
      - name: ⏳ Wait for SSH
        run: |
          echo "Waiting for SSH on $IP_ADDRESS..."
          for i in {1..10}; do
            if nc -z -w 5 $IP_ADDRESS 22; then
              echo "SSH is available!"
              exit 0
            fi
            echo "Attempt $i/10: still waiting..."
            sleep 5
          done
          echo "❌ SSH not available in time"
          exit 1
        env:
          IP_ADDRESS: ${{ env.IP_ADDRESS }}

      # Step 11: Install Docker on Server 
      - name:  Install Docker on Server
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/odogwu1.pem
          chmod 600 ~/.ssh/odogwu1.pem
          ssh-keyscan -H $IP_ADDRESS >> ~/.ssh/known_hosts 2>/dev/null

          echo "Testing SSH connection first..."
          ssh -i ~/.ssh/odogwu1.pem -o StrictHostKeyChecking=no ec2-user@$IP_ADDRESS "echo 'SSH connection successful!'"

          echo "Installing Docker on the server..."
          ssh -i ~/.ssh/odogwu1.pem -o StrictHostKeyChecking=no ec2-user@$IP_ADDRESS << 'EOF'
          # Install Docker
          sudo yum update -y
          sudo amazon-linux-extras install docker -y
          sudo yum install -y docker
          
          # Start and enable Docker
          sudo systemctl start docker
          sudo systemctl enable docker
          
          # Add user to docker group
          sudo usermod -a -G docker ec2-user
          
          # Verify Docker installation
          sudo docker --version
          echo "Docker installed successfully!"
          EOF
          
          # Test Docker installation
          echo "Testing Docker installation..."
          ssh -i ~/.ssh/odogwu1.pem -o StrictHostKeyChecking=no ec2-user@$IP_ADDRESS "sudo docker ps"
          echo "Docker installation verified!"
        env:
          IP_ADDRESS: ${{ env.IP_ADDRESS }}

      # Step 12: Deploy with Ansible
      - name:  Deploy with Ansible
        run: |
          echo "Running Ansible playbook..."
          ansible-playbook -i "$IP_ADDRESS," ansible/playbook.yml \
            --private-key=~/.ssh/odogwu1.pem \
            -u ec2-user \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"
        env:
          IP_ADDRESS: ${{ env.IP_ADDRESS }}

      # Step 13: Cleanup
      - name:  Cleanup
        if: always()
        run: rm -f terraform/tfplan

    timeout-minutes: 30